services:
  - type: web
    name: stepout-string-checker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stepout-string-checker-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.13.3

databases:
  - name: stepout-string-checker-db
    plan: free
    databaseName: stepout_checker
